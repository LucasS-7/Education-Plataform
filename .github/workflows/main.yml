name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Course Service
        run: |
          cd course-service
          mvn clean package -DskipTests

      - name: Build Enrollment Service
        run: |
          cd enrollment-service
          mvn clean package -DskipTests

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Course Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest ./course-service

      - name: Build Enrollment Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest ./enrollment-service

      - name: Push Course Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest

      - name: Push Enrollment Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest
