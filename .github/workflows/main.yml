name: Build and Deploy Microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Descargar código
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Login DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # COURSE SERVICE
      # =========================

      # 3. Build course-service
      - name: Build Course Service Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest ./course-service

      # 4. Push course-service
      - name: Push Course Service Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest

      # =========================
      # ENROLLMENT SERVICE
      # =========================

      # 5. Build enrollment-service
      - name: Build Enrollment Service Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest ./enrollment-service

      # 6. Push enrollment-service
      - name: Push Enrollment Service Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest

      # =========================
      # AWS CREDENTIALS
      # =========================

      # 7. Configurar AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # =========================
      # SSH KEY
      # =========================

      # 8. Configurar SSH
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # =========================
      # DEPLOY EC2
      # =========================

      # 9. Deploy en EC2
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

            # Login DockerHub
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login \
            -u ${{ secrets.DOCKERHUB_USERNAME }} \
            --password-stdin

            # Descargar imágenes
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest

            # Detener contenedores antiguos
            docker stop course-service || true
            docker rm course-service || true

            docker stop enrollment-service || true
            docker rm enrollment-service || true

            # Ejecutar Course Service
            docker run -d \
              --name course-service \
              -p 8081:8081 \
              ${{ secrets.DOCKERHUB_USERNAME }}/course-service:latest

            # Ejecutar Enrollment Service
            docker run -d \
              --name enrollment-service \
              -p 8082:8082 \
              ${{ secrets.DOCKERHUB_USERNAME }}/enrollment-service:latest

          EOF
